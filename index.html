<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Kitchen Fire</title>

  <style>
    :root{
      --bg: #f3e6d8;
      --ink: #1f140e;
      --muted: rgba(31,20,14,0.68);
      --line: rgba(31,20,14,0.16);
      --paper: rgba(255,255,255,0.76);
      --shadow: 0 12px 26px rgba(0,0,0,0.12);
      --r: 12px;

      --ember: #ff6a00;
      --flame: #ff2d2d;
      --gold: #D4AF37;
      --earth: #8B4513;

      --windowW: clamp(170px, 22vw, 260px);
      --lanePadY: 10px;
      --laneGap: 10px;
      --symbolMin: 62px;
      --symbolMax: 92px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

    html, body {
      height: 100%;
    }

    body{
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display:flex;
      justify-content:center;
      align-items:stretch;
      padding:0;
      transition: background-color .12s ease;
    }

    .wrap{
      width: min(1400px, 98vw);
      margin: 0 auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      height: 100vh;
      padding: 10px;
    }

    .top{
      background: linear-gradient(180deg, #ff9f1a, #8a2d00);
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding: 10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex: 0 0 auto;
      overflow:hidden;
      color: white;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.18);
    }

    .top-header{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .brand{
      flex:1;
      min-width: 260px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .brand h1{
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .6px;
      font-size: clamp(1.05rem, 1.8vw, 1.45rem);
      line-height: 1.0;
    }

    .brand p{
      color: rgba(255,255,255,.93);
      line-height: 1.2;
      font-size: clamp(.86rem, 1.2vw, .98rem);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .chip{
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 1000;
      letter-spacing: .2px;
      white-space: nowrap;
      font-size: .88rem;
      color: var(--ink);
      text-shadow: none;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .hearts{
      display:flex;
      align-items:center;
      gap:4px;
      font-size: 1.05rem;
      line-height: 1;
    }

    .heart.off{
      opacity: .26;
      filter: grayscale(1);
    }

    .mode{
      display:flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow:hidden;
      background: rgba(255,255,255,0.92);
    }

    .mode button{
      border:none;
      background: transparent;
      padding: 7px 12px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .25px;
      cursor:pointer;
      color: rgba(31,20,14,0.85);
      font-size: .84rem;
    }

    .mode button.active{
      background: rgba(255,255,255,0.35);
      box-shadow: inset 0 0 0 1px rgba(31,20,14,0.10);
      color: #2b1100;
    }

    .btn{
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .25px;
      cursor:pointer;
      font-size: .84rem;
    }

    .btn:active{
      transform: translateY(1px);
    }

    .meter{
      display:flex;
      align-items:center;
      gap:10px;
      flex: 1 1 320px;
      min-width: 260px;
    }

    .meter .label{
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .35px;
      white-space: nowrap;
      color: rgba(255,255,255,0.95);
    }

    .bar{
      position: relative;
      height: 12px;
      flex:1;
      min-width: 140px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.35);
      overflow:hidden;
    }

    .bar > .fill{
      position:absolute;
      inset:0;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffd000, #ff8a00, #ff2d2d);
      transition: width .15s linear;
    }

    .bar.pulse > .fill{
      animation: pulseBar .9s infinite;
    }

    @keyframes pulseBar{
      0%{ filter: brightness(1); }
      50%{ filter: brightness(1.25); }
      100%{ filter: brightness(1); }
    }

    .targets{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      border-top: 1px solid rgba(255,255,255,0.28);
      padding-top: 8px;
    }

    .targets .label{
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .35px;
      color:white;
      white-space: nowrap;
    }

    #targetContainer{
      display:flex;
      gap:8px;
      align-items:center;
      flex:1;
      flex-wrap:wrap;
      overflow:hidden;
    }

    .target-tag{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.95);
      height: 62px;
      min-width: 260px;
      max-width: 360px;
      flex: 1 1 260px;
      transition: all .2s ease;
      color: var(--ink);
      text-shadow:none;
    }

    .target-tag.done{
      opacity: .62;
    }

    .target-tag.active{
      outline: 4px solid rgba(255,208,0,0.95);
      outline-offset: 2px;
      transform: scale(1.02);
      box-shadow: 0 0 16px rgba(255,208,0,0.85);
    }

    .target-tag img{
      width: 46px;
      height: 46px;
      object-fit: contain;
      flex:0 0 auto;
    }

    .target-meta{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
      flex:1;
    }

    .target-meta .name{
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .25px;
      font-size: .92rem;
      line-height: 1.05;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      color: var(--ink);
    }

    .target-meta .meaning{
      display:block;
      visibility:hidden;
      height: 1.1em;
      color: rgba(31,20,14,0.72);
      font-size: .80rem;
      line-height: 1.1;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    .target-tag.done .target-meta .meaning{
      visibility: visible;
    }

    .pill{
      border: 1px solid rgba(31,20,14,0.18);
      background: rgba(255,255,255,0.92);
      border-radius: 999px;
      padding: 6px 9px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .2px;
      font-size: .76rem;
      white-space: nowrap;
      flex: 0 0 auto;
      color: var(--ink);
    }

    .machine{
      position: relative;
      border: 8px solid #4a3729;
      border-radius: 20px;
      background:
        radial-gradient(1200px 500px at 50% 110%, rgba(255,80,0,0.35), rgba(0,0,0,0)),
        linear-gradient(145deg, #2a1e14, #1a120b);
      box-shadow:
        0 20px 30px rgba(0,0,0,0.5),
        inset 0 0 28px rgba(255, 140, 0, 0.22);
      padding: 10px;
      overflow:hidden;
      flex: 1 1 auto;
      min-height: 0;
      transition: opacity 180ms ease, filter 450ms ease, transform 450ms ease;
    }

    .machine.collapse{
      filter: grayscale(0.4) blur(1px) brightness(0.92);
      transform: scale(0.995);
    }

    .window{
      position:absolute;
      left:50%;
      top:10px;
      bottom:10px;
      width: var(--windowW);
      transform: translateX(-50%);
      border-radius: 0;
      border: 4px solid rgba(255,208,0,0.95);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.62),
        0 0 18px rgba(255,208,0,0.75);
      pointer-events:none;
      z-index:4;
      animation: windowPulse 2s infinite;
    }

    @keyframes windowPulse{
      0%{ opacity:.78; }
      50%{ opacity:1; box-shadow: 0 0 26px rgba(255,208,0,0.95); }
      100%{ opacity:.78; }
    }

    .lane{
      position:relative;
      overflow:hidden;
      border-radius:0;
      border: 1px solid rgba(31,20,14,0.18);
      background:
        linear-gradient(to right, rgba(243,230,216,0.98), rgba(243,230,216,0) 70px),
        linear-gradient(to left,  rgba(243,230,216,0.98), rgba(243,230,216,0) 70px),
        rgba(255,255,255,0.94);
      padding: var(--lanePadY) 0;
      margin: var(--laneGap) 0;
    }

    .lane::before{
      content:"▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬";
      color: rgba(0,0,0,0.10);
      font-size: 20px;
      position:absolute;
      width:100%;
      text-align:center;
      letter-spacing:20px;
      bottom:0;
      pointer-events:none;
      z-index:1;
    }

    .lane.good{
      border-color: rgba(42,157,88,0.95);
      box-shadow: inset 0 0 0 2px rgba(42,157,88,0.14);
    }

    .lane.bad{
      border-color: rgba(255,45,45,0.95);
      box-shadow: inset 0 0 0 2px rgba(255,45,45,0.14);
    }

    .moving-row{
      display:flex;
      align-items:center;
      gap:14px;
      width: max-content;
      will-change: transform;
      animation-duration: var(--speed, 12s);
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-play-state: running;
    }

    .moving-row.ltr{
      animation-name: scroll-ltr;
    }

    .moving-row.rtl{
      animation-name: scroll-rtl;
    }

    @keyframes scroll-ltr{
      from{ transform: translateX(0); }
      to{ transform: translateX(-33.333%); }
    }

    @keyframes scroll-rtl{
      from{ transform: translateX(-33.333%); }
      to{ transform: translateX(0); }
    }

    .symbol{
      width: clamp(var(--symbolMin), 7vw, var(--symbolMax));
      height: clamp(var(--symbolMin), 7vw, var(--symbolMax));
      object-fit: contain;
      cursor:pointer;
      user-select:none;
      -webkit-user-select:none;
      transform: translateZ(0);
      transition: transform .08s ease, opacity .08s ease, filter .08s ease;
      pointer-events:auto;
      touch-action: manipulation;
      border-radius: 10px;
      position: relative;
      z-index: 2;
    }

    .symbol:active{
      transform: scale(0.90);
      opacity: .85;
    }

    .symbol.in-window{
      filter: drop-shadow(0 0 14px rgba(255,208,0,0.9));
      transform: scale(1.08);
    }

    .symbol.burnt{
      filter: grayscale(0.55) sepia(0.45) brightness(0.72) contrast(1.08)
              drop-shadow(0 2px 3px rgba(0,0,0,0.15));
      opacity: 0.92;
    }

    .toast{
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      box-shadow: var(--shadow);
      border-radius: 999px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .25px;
      display:none;
      z-index: 999;
      max-width: min(92vw, 820px);
      text-align:center;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      color: var(--ink);
      text-shadow:none;
    }

    .toast.show{
      display:block;
    }

    .success-flash{
      animation: successFlash .26s ease;
    }

    @keyframes successFlash{
      0%{ background-color: rgba(255,106,0,0); }
      50%{ background-color: rgba(255,106,0,0.18); }
      100%{ background-color: rgba(255,106,0,0); }
    }

    .collapse-overlay{
      position: absolute;
      inset: 0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index: 20;
      background: radial-gradient(900px 420px at 50% 70%, rgba(0,0,0,0.42), rgba(0,0,0,0.72));
      color: white;
      text-align:center;
      padding: 18px;
    }

    .collapse-overlay.show{
      display:flex;
    }

    .collapse-card{
      width: min(520px, 92vw);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 18px 16px;
      background: rgba(0,0,0,0.35);
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    .collapse-card h2{
      font-size: 1.35rem;
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .collapse-card p{
      opacity: .92;
      margin: 8px 0 14px 0;
      line-height: 1.25;
    }

    .collapse-stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-bottom: 12px;
    }

    .stat{
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 8px 10px;
      font-weight: 900;
      letter-spacing: .25px;
      text-transform: uppercase;
      font-size: .86rem;
      white-space: nowrap;
    }

    .footer{
      text-align:center;
      font-size:0.85rem;
      margin-top:6px;
      opacity:0.75;
      color: var(--ink);
    }

    .footer a{
      color: var(--ink);
      font-weight: 650;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top" id="top">
      <div class="top-header">
        <div class="brand">
          <h1>Kitchen on Fire</h1>
          <p>Tap the ingredient in the gold window before it burns</p>
        </div>

        <div class="controls">
          <span class="chip" id="levelDisplay">LEVEL 1</span>
          <span class="chip" id="progressCounter">0 / 1</span>

          <span class="chip" aria-label="Hearts">
            <span>Lives</span>
            <span class="hearts" id="hearts"></span>
          </span>

          <div class="mode" aria-label="Mode">
            <button id="modeNormal" type="button" class="active">Normal</button>
            <button id="modeHard" type="button">Hard</button>
          </div>

          <button class="btn" id="resetButton" type="button">Restart</button>
        </div>
      </div>

      <div class="meter" aria-label="Chaos meter">
        <div class="label">Heat</div>
        <div class="bar" id="chaosBar"><div class="fill" id="chaosFill"></div></div>
        <span class="chip" id="heatLabel">CALM</span>
      </div>

      <div class="targets">
        <div class="label">Cook</div>
        <div id="targetContainer"></div>
      </div>
    </div>

    <div class="machine" id="machine">
      <div class="window" id="slotWindow" aria-hidden="true"></div>
      <div id="rowsArea"></div>

      <div class="collapse-overlay" id="collapseOverlay" aria-hidden="true">
        <div class="collapse-card">
          <h2>Kitchen Overheated</h2>
          <p>The heat got away from you. Reset and try again.</p>
          <div class="collapse-stats">
            <div class="stat" id="statLevel">Level: 1</div>
            <div class="stat" id="statHeat">Heat: 0%</div>
          </div>
          <button class="btn" id="collapseRestart" type="button">Restart</button>
        </div>
      </div>
    </div>

    <div class="footer">
      Created by
      <a href="https://www.theafricangourmet.com/p/home.html" target="_blank" rel="noreferrer">African Gourmet Archives</a>
      ·
      <a href="https://chicafricanculture.github.io/african-foodways-data/" target="_blank" rel="noreferrer">GitHub</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const INGREDIENTS = [
      { name: "Pepper",    file: "pepper.svg",    meaning: "Heat" },
      { name: "Plantain",  file: "plantain.svg",  meaning: "Sweetness" },
      { name: "Fish",      file: "fish.svg",      meaning: "Protein" },
      { name: "Yam",       file: "yam.svg",       meaning: "Staple" },
      { name: "Onion",     file: "onion.svg",     meaning: "Base" },
      { name: "Tomato",    file: "tomato.svg",    meaning: "Body" },
      { name: "Egusi",     file: "egusi.svg",     meaning: "Thickener" },
      { name: "Palm Oil",  file: "palm-oil.svg",  meaning: "Flavor" },
    ];

    const MODES = { NORMAL: "NORMAL", HARD: "HARD" };

    const LEVELS = [
      { level: 1, rows: 1, pool: 4, baseSpeedSeconds: 15, baseLen: 22 },
      { level: 2, rows: 2, pool: 4, baseSpeedSeconds: 13, baseLen: 22 },
      { level: 3, rows: 3, pool: 6, baseSpeedSeconds: 12, baseLen: 24 },
      { level: 4, rows: 3, pool: 6, baseSpeedSeconds: 11, baseLen: 26 },
      { level: 5, rows: 4, pool: 8, baseSpeedSeconds: 10, baseLen: 28 },
      { level: 6, rows: 4, pool: 8, baseSpeedSeconds: 9,  baseLen: 30 },
    ];

    const CHAOS = {
      min: 1.00,
      max: 2.20,
      perHit: 0.03,
      perSecond: 0.006,
      mercyOnMistake: 0.06,
    };

    const LIVES_MAX = 3;

    const HARD = {
      burntRate: 0.18,
      extraDensity: 1.15,
    };

    const topEl = document.getElementById("top");
    const machineEl = document.getElementById("machine");
    const rowsArea = document.getElementById("rowsArea");
    const targetContainer = document.getElementById("targetContainer");
    const levelDisplay = document.getElementById("levelDisplay");
    const progressCounter = document.getElementById("progressCounter");
    const resetButton = document.getElementById("resetButton");
    const slotWindow = document.getElementById("slotWindow");
    const toast = document.getElementById("toast");
    const modeNormalBtn = document.getElementById("modeNormal");
    const modeHardBtn = document.getElementById("modeHard");
    const heartsEl = document.getElementById("hearts");
    const chaosBar = document.getElementById("chaosBar");
    const chaosFill = document.getElementById("chaosFill");
    const heatLabel = document.getElementById("heatLabel");
    const collapseOverlay = document.getElementById("collapseOverlay");
    const collapseRestart = document.getElementById("collapseRestart");
    const statLevel = document.getElementById("statLevel");
    const statHeat = document.getElementById("statHeat");

    let currentLevelIndex = 0;
    let mode = MODES.NORMAL;

    let targets = [];
    let activeRowIndex = 0;
    let levelComplete = false;

    let lives = LIVES_MAX;
    let chaos = CHAOS.min;
    let chaosTickId = null;
    let highlightTimerId = null;
    let toastTimerId = null;

    let audioCtx = null;
    let drumTimerId = null;

    function showToast(msg, ms = 1200) {
      if (toastTimerId) clearTimeout(toastTimerId);
      toast.textContent = msg;
      toast.classList.add("show");
      toastTimerId = setTimeout(() => {
        toast.classList.remove("show");
      }, ms);
    }

    function clamp(n, a, b){
      return Math.max(a, Math.min(b, n));
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function rowDirection(rowIndex) {
      return rowIndex % 2 === 0 ? "ltr" : "rtl";
    }

    function getItem(name) {
      return INGREDIENTS.find(s => s.name === name) || null;
    }

    function isInWindow(imgEl) {
      const windowRect = slotWindow.getBoundingClientRect();
      const imgRect = imgEl.getBoundingClientRect();
      const imgCenterX = imgRect.left + imgRect.width / 2;
      const imgCenterY = imgRect.top + imgRect.height / 2;

      return imgCenterX >= windowRect.left &&
             imgCenterX <= windowRect.right &&
             imgCenterY >= windowRect.top &&
             imgCenterY <= windowRect.bottom;
    }

    function updateWindowHighlights() {
      const selector =
        mode === MODES.HARD
          ? `.moving-row[data-row="${activeRowIndex}"] .symbol`
          : `.symbol`;

      document.querySelectorAll(".symbol.in-window").forEach(img => {
        img.classList.remove("in-window");
      });

      document.querySelectorAll(selector).forEach(img => {
        img.classList.toggle("in-window", isInWindow(img));
      });
    }

    function startHighlightLoop() {
      stopHighlightLoop();
      highlightTimerId = setInterval(updateWindowHighlights, 100);
    }

    function stopHighlightLoop() {
      if (highlightTimerId) clearInterval(highlightTimerId);
      highlightTimerId = null;
    }

    function setAllRowsState(state) {
      document.querySelectorAll(".moving-row").forEach(r => {
        r.style.animationPlayState = state;
      });
    }

    function pauseRow(rowIndex) {
      const row = document.querySelector(`.moving-row[data-row="${rowIndex}"]`);
      if (row) row.style.animationPlayState = "paused";
    }

    function flashLane(rowIndex, kind) {
      const lane = document.querySelector(`.lane[data-row="${rowIndex}"]`);
      if (!lane) return;
      lane.classList.remove("good", "bad");
      lane.classList.add(kind);
      setTimeout(() => lane.classList.remove(kind), 220);
    }

    function applyResponsiveSizing(levelRows) {
      const root = document.documentElement.style;
      const vh = window.innerHeight || 800;
      const topH = topEl.getBoundingClientRect().height;
      const footerH = document.querySelector(".footer").getBoundingClientRect().height || 0;
      const paddingAndGaps = 34;
      const machineAvailable = Math.max(240, vh - topH - footerH - paddingAndGaps);

      const maxSymbol = Math.min(124, Math.floor(machineAvailable / (levelRows * 1.45)));
      const minSymbol = Math.max(52, Math.floor(maxSymbol * 0.78));
      const pad = Math.max(4, Math.floor(maxSymbol * 0.10));
      const gap = Math.max(4, Math.floor(maxSymbol * 0.10));

      root.setProperty("--symbolMax", `${maxSymbol}px`);
      root.setProperty("--symbolMin", `${minSymbol}px`);
      root.setProperty("--lanePadY", `${pad}px`);
      root.setProperty("--laneGap", `${gap}px`);
    }

    function renderHearts() {
      heartsEl.innerHTML = "";
      for (let i = 0; i < LIVES_MAX; i++) {
        const s = document.createElement("span");
        s.textContent = "❤";
        s.className = "heart" + (i < lives ? "" : " off");
        heartsEl.appendChild(s);
      }
    }

    function chaosPct() {
      return (chaos - CHAOS.min) / (CHAOS.max - CHAOS.min);
    }

    function updateHeatUI() {
      const pct = clamp(chaosPct(), 0, 1);
      const p100 = Math.round(pct * 100);
      chaosFill.style.width = `${p100}%`;

      const label =
        p100 < 35 ? "CALM" :
        p100 < 65 ? "RUSH" :
        p100 < 90 ? "CHAOS" : "OVERLOAD";

      heatLabel.textContent = label;
      chaosBar.classList.toggle("pulse", p100 >= 90);
    }

    function updateHUD() {
      const level = LEVELS[currentLevelIndex];
      const doneCount = targets.filter(t => t.done).length;
      levelDisplay.textContent = `LEVEL ${level.level}`;
      progressCounter.textContent = `${doneCount} / ${targets.length}`;
      renderHearts();
      updateHeatUI();
    }

    function buildTargetsForLevel(level) {
      const pool = INGREDIENTS.slice(0, level.pool);
      const names = shuffle(pool.map(s => s.name));
      const chosen = [];

      for (let r = 0; r < level.rows; r++) {
        const name = names[r % names.length];
        chosen.push({ rowIndex: r, name, done: false });
      }

      return chosen;
    }

    function computeTargetCount({ baseLen, speedSeconds }) {
      const symPerSecond = baseLen / Math.max(1, speedSeconds);
      const approxGap = clamp(Math.round(2.2 * symPerSecond), 4, 10);
      const needed = Math.ceil(baseLen / approxGap) + 1;
      return clamp(needed, 4, 8);
    }

    function pickTargetPositionsEven({ baseLen, targetCount }) {
      const positions = [];
      const step = Math.floor(baseLen / (targetCount + 1));

      for (let i = 1; i <= targetCount; i++) {
        const jitter = Math.floor(Math.random() * Math.max(1, step * 0.3));
        const p = (i * step + jitter) % baseLen;
        positions.push(p);
      }

      const uniq = Array.from(new Set(positions));
      while (uniq.length < targetCount) {
        const p = Math.floor(Math.random() * baseLen);
        if (!uniq.includes(p)) uniq.push(p);
      }

      uniq.sort((a,b) => a - b);
      return uniq;
    }

    function buildRowSequence({ level, speedSeconds, baseLen, targetName }) {
      const pool = INGREDIENTS.slice(0, level.pool).map(x => x.name);
      const pattern = new Array(baseLen).fill(null);

      const targetCount = computeTargetCount({ baseLen, speedSeconds });
      const positions = pickTargetPositionsEven({ baseLen, targetCount });

      for (const p of positions) {
        pattern[p] = { name: targetName, isTarget: true, state: "fresh" };
      }

      let last = null;
      let streak = 0;

      for (let i = 0; i < baseLen; i++) {
        if (pattern[i]) {
          const nm = pattern[i].name;
          if (nm === last) streak += 1;
          else { last = nm; streak = 1; }
          continue;
        }

        let pick = null;
        for (let tries = 0; tries < 60; tries++) {
          const candidate = pool[Math.floor(Math.random() * pool.length)];
          if (candidate === targetName) continue;
          if (candidate === last && streak >= 2) continue;
          pick = candidate;
          break;
        }

        if (!pick) {
          pick = pool[0] === targetName ? pool[1] : pool[0];
        }

        const burnt = mode === MODES.HARD && Math.random() < HARD.burntRate;

        pattern[i] = {
          name: pick,
          isTarget: false,
          state: burnt ? "burnt" : "fresh"
        };

        if (pick === last) streak += 1;
        else { last = pick; streak = 1; }
      }

      return [...pattern, ...pattern, ...pattern];
    }

    function renderTargets() {
      targetContainer.innerHTML = "";

      for (const t of targets) {
        const item = getItem(t.name);
        if (!item) continue;

        const tag = document.createElement("div");
        tag.className = "target-tag";

        const highlight =
          !t.done &&
          !levelComplete &&
          (mode === MODES.NORMAL || t.rowIndex === activeRowIndex);

        if (highlight) tag.classList.add("active");
        if (t.done) tag.classList.add("done");

        const img = document.createElement("img");
        img.alt = item.name;
        img.src = `images/${item.file}`;

        const meta = document.createElement("div");
        meta.className = "target-meta";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = item.name;

        const meaning = document.createElement("div");
        meaning.className = "meaning";
        meaning.textContent = item.meaning;

        const rowPill = document.createElement("span");
        rowPill.className = "pill";
        rowPill.textContent = `Row ${t.rowIndex + 1}`;

        meta.appendChild(name);
        meta.appendChild(meaning);

        tag.appendChild(img);
        tag.appendChild(meta);
        tag.appendChild(rowPill);

        targetContainer.appendChild(tag);
      }

      updateHUD();
    }

    function celebrateSuccess(img) {
      document.body.classList.add("success-flash");
      setTimeout(() => document.body.classList.remove("success-flash"), 260);

      img.style.transform = "scale(1.2)";
      setTimeout(() => {
        img.style.transform = "";
      }, 150);
    }

    function loseLife(reason = "") {
      lives = Math.max(0, lives - 1);
      updateHUD();

      if (lives <= 0) {
        onDeath();
        return;
      }

      chaos = clamp(chaos - CHAOS.mercyOnMistake, CHAOS.min, CHAOS.max);
      updateHeatUI();

      if (reason) showToast(reason, 800);
    }

    function bumpChaosOnHit() {
      chaos = clamp(chaos + CHAOS.perHit, CHAOS.min, CHAOS.max);
    }

    function startChaosTick() {
      stopChaosTick();
      chaosTickId = setInterval(() => {
        if (levelComplete) return;
        chaos = clamp(chaos + CHAOS.perSecond, CHAOS.min, CHAOS.max);
        updateHeatUI();
        retimeRows();
        retimeDrums();
      }, 1000);
    }

    function stopChaosTick() {
      if (chaosTickId) clearInterval(chaosTickId);
      chaosTickId = null;
    }

    function speedMultiplier() {
      return chaos;
    }

    function retimeRows() {
      const level = LEVELS[currentLevelIndex];
      document.querySelectorAll(".moving-row").forEach((rowEl) => {
        const r = Number(rowEl.dataset.row || "0");
        const base = Math.max(6, level.baseSpeedSeconds - (r % 2));
        const dur = base / speedMultiplier();
        rowEl.style.setProperty("--speed", `${dur.toFixed(2)}s`);
      });
    }

    async function ensureAudio() {
      if (!window.AudioContext && !window.webkitAudioContext) return;

      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioCtx.state === "suspended") {
        try {
          await audioCtx.resume();
        } catch (err) {
          return;
        }
      }

      if (!drumTimerId) {
        startDrums();
      }
    }

    function playKick(time, gainValue) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(140, time);
      osc.frequency.exponentialRampToValueAtTime(55, time + 0.08);

      gain.gain.setValueAtTime(0.0001, time);
      gain.gain.exponentialRampToValueAtTime(gainValue, time + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.18);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(time);
      osc.stop(time + 0.2);
    }

    function playClick(time, gainValue) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(520, time);
      osc.frequency.exponentialRampToValueAtTime(260, time + 0.05);

      gain.gain.setValueAtTime(0.0001, time);
      gain.gain.exponentialRampToValueAtTime(gainValue, time + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.10);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(time);
      osc.stop(time + 0.12);
    }

    function drumsBpm() {
      const pct = clamp(chaosPct(), 0, 1);
      return 72 + (132 - 72) * pct;
    }

    function startDrums() {
      stopDrums();

      const schedule = () => {
        if (!audioCtx || audioCtx.state !== "running") return;

        const bpm = drumsBpm();
        const intervalMs = 60000 / bpm;

        const t = audioCtx.currentTime;
        const pct = clamp(chaosPct(), 0, 1);

        playKick(t, 0.06 + 0.05 * pct);
        if (pct >= 0.55) playClick(t + 0.02, 0.03 + 0.03 * pct);

        drumTimerId = setTimeout(schedule, intervalMs);
      };

      schedule();
    }

    function stopDrums() {
      if (drumTimerId) clearTimeout(drumTimerId);
      drumTimerId = null;
    }

    function retimeDrums() {
      if (!audioCtx || audioCtx.state !== "running") return;
      startDrums();
    }

    function sfxSuccess() {
      if (!audioCtx || audioCtx.state !== "running") return;

      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(523.25, t);
      osc.frequency.setValueAtTime(659.25, t + 0.05);
      osc.frequency.setValueAtTime(783.99, t + 0.10);

      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.08, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(t);
      osc.stop(t + 0.25);
    }

    async function handleSymbolClick(img) {
      if (levelComplete) return;

      await ensureAudio();

      const rowIndex = Number(img.dataset.row);
      const name = img.dataset.name;
      const state = img.dataset.state || "fresh";

      if (!isInWindow(img)) return;

      if (mode === MODES.HARD && rowIndex !== activeRowIndex) {
        return;
      }

      if (state === "burnt") {
        flashLane(rowIndex, "bad");
        loseLife("Burnt ingredient");
        return;
      }

      const target = targets.find(t => t.rowIndex === rowIndex);
      if (!target || target.done) return;

      const match = name === target.name;
      if (!match) {
        flashLane(rowIndex, "bad");
        loseLife("Wrong ingredient");
        return;
      }

      bumpChaosOnHit();
      updateHeatUI();
      retimeRows();
      retimeDrums();

      sfxSuccess();
      celebrateSuccess(img);
      flashLane(rowIndex, "good");

      target.done = true;
      pauseRow(rowIndex);

      if (mode === MODES.HARD) {
        const next = targets.find(t => !t.done);
        activeRowIndex = next ? next.rowIndex : 0;
      }

      renderTargets();

      if (targets.every(t => t.done)) {
        onLevelWin();
      }
    }

    rowsArea.addEventListener("click", (e) => {
      const img = e.target.closest("img.symbol");
      if (!img) return;
      handleSymbolClick(img);
    }, true);

    function buildLevel(levelIndex) {
      const level = LEVELS[levelIndex];
      if (!level) return;

      levelComplete = false;
      rowsArea.innerHTML = "";

      targets = buildTargetsForLevel(level);
      activeRowIndex = 0;

      for (let r = 0; r < level.rows; r++) {
        const lane = document.createElement("div");
        lane.className = "lane";
        lane.dataset.row = String(r);

        const movingRow = document.createElement("div");
        movingRow.className = `moving-row ${rowDirection(r)}`;
        movingRow.dataset.row = String(r);

        const lenBase = level.baseLen * (mode === MODES.HARD ? HARD.extraDensity : 1.0);
        const baseLen = Math.round(lenBase);

        const base = Math.max(6, level.baseSpeedSeconds - (r % 2));
        const dur = base / speedMultiplier();
        movingRow.style.setProperty("--speed", `${dur.toFixed(2)}s`);

        const rowTarget = targets.find(t => t.rowIndex === r);
        const seq = buildRowSequence({
          level,
          speedSeconds: dur,
          baseLen,
          targetName: rowTarget.name,
        });

        for (const it of seq) {
          const s = getItem(it.name);
          if (!s) continue;

          const el = document.createElement("img");
          el.src = `images/${s.file}`;
          el.alt = it.name;
          el.className = "symbol" + (it.state === "burnt" ? " burnt" : "");
          el.dataset.row = String(r);
          el.dataset.name = it.name;
          el.dataset.state = it.state;
          el.setAttribute("aria-label", `${it.name}${it.state === "burnt" ? " burnt" : ""}`);

          movingRow.appendChild(el);
        }

        lane.appendChild(movingRow);
        rowsArea.appendChild(lane);
      }

      renderTargets();
      requestAnimationFrame(() => {
        applyResponsiveSizing(level.rows);
        updateWindowHighlights();
      });

      setAllRowsState("running");
      startChaosTick();
      startHighlightLoop();
    }

    function onLevelWin() {
      levelComplete = true;
      stopChaosTick();
      setAllRowsState("paused");

      lives = Math.min(LIVES_MAX, lives + 1);
      const levelNum = LEVELS[currentLevelIndex].level;
      showToast(`Level ${levelNum} served`, 1100);

      setTimeout(() => {
        currentLevelIndex = currentLevelIndex >= LEVELS.length - 1 ? 0 : currentLevelIndex + 1;
        machineEl.style.opacity = "0";

        setTimeout(() => {
          buildLevel(currentLevelIndex);
          machineEl.style.opacity = "1";
        }, 180);
      }, 820);
    }

    function onDeath() {
      levelComplete = true;
      stopChaosTick();
      setAllRowsState("paused");

      machineEl.classList.add("collapse");
      collapseOverlay.classList.add("show");
      collapseOverlay.setAttribute("aria-hidden", "false");

      if (audioCtx) {
        stopDrums();
      }

      const levelNum = LEVELS[currentLevelIndex].level;
      const heat = Math.round(clamp(chaosPct(), 0, 1) * 100);
      statLevel.textContent = `Level: ${levelNum}`;
      statHeat.textContent = `Heat: ${heat}%`;
    }

    function restartRun() {
      stopChaosTick();
      setAllRowsState("paused");
      machineEl.classList.remove("collapse");
      collapseOverlay.classList.remove("show");
      collapseOverlay.setAttribute("aria-hidden", "true");

      lives = LIVES_MAX;
      chaos = CHAOS.min;
      currentLevelIndex = 0;
      levelComplete = false;

      updateHUD();

      if (audioCtx && audioCtx.state === "running") {
        startDrums();
      }

      buildLevel(currentLevelIndex);
    }

    function setMode(newMode, options = {}) {
      const { silent = false } = options;

      mode = newMode;
      modeNormalBtn.classList.toggle("active", mode === MODES.NORMAL);
      modeHardBtn.classList.toggle("active", mode === MODES.HARD);

      const next = targets.find(t => !t.done);
      activeRowIndex = next ? next.rowIndex : 0;

      if (!silent) {
        showToast(
          mode === MODES.NORMAL
            ? "Normal mode: any order"
            : "Hard mode: row by row with distractions",
          900
        );
      }

      buildLevel(currentLevelIndex);
    }

    resetButton.addEventListener("click", restartRun);
    collapseRestart.addEventListener("click", restartRun);
    modeNormalBtn.addEventListener("click", () => {
      if (mode !== MODES.NORMAL) setMode(MODES.NORMAL);
    });
    modeHardBtn.addEventListener("click", () => {
      if (mode !== MODES.HARD) setMode(MODES.HARD);
    });

    window.addEventListener("resize", () => {
      applyResponsiveSizing(LEVELS[currentLevelIndex].rows);
      updateWindowHighlights();
    });

    window.addEventListener("load", () => {
      updateHUD();
      setMode(MODES.NORMAL, { silent: true });
    });
  </script>
</body>
</html>
